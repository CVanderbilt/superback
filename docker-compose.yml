services:
  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/supers?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 30
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supers
    # Host port 5435 avoids clashing with a local Postgres on 5432 (Postgres.app, Homebrew, etc.)
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supers"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
